<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mes projets — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f2f0;
      --top:#ead6d1;
      --card:#f0dfdb;
      --card2:#efe2de;
      --accent3:#d8948f;
      --text:#6b5a55;
      --shadow:0 10px 28px rgba(0,0,0,.06);
      --r:18px;
      --gap:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:28px auto 60px;
      padding:0 18px;
    }

    /* header */
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }
    .brand{display:flex; align-items:center; gap:14px;}
    .logo{
      width:46px;height:46px;border-radius:999px;
      background:var(--top);
      display:grid;place-items:center;
      box-shadow:var(--shadow);
      font-weight:600;
      color:#6b5a55;
    }
    .name{
      background:var(--top);
      padding:10px 14px;
      border-radius:999px;
      box-shadow:var(--shadow);
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:13px;
      color:#6b5a55;
      white-space:nowrap;
    }
    nav{
      background:var(--top);
      padding:12px 16px;
      border-radius:999px;
      box-shadow:var(--shadow);
      display:flex;
      gap:22px;
      font-size:13px;
    }
    nav a{
      color:#6b5a55;
      text-decoration:none;
      opacity:.95;
    }
    nav a:hover{opacity:1;text-decoration:underline}

    /* titre */
    .page-title{
      text-align:center;
      margin:26px 0 22px;
      font-family:"Playfair Display", serif;
      font-weight:500;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#5b4f4b;
      font-size:44px;
    }

    /* grille des projets */
    .projects-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      justify-items:center;
    }

    .project-card{
      width:100%;
      max-width:330px;
      height:220px;
      border-radius:var(--r);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#5b4f4b;
      transition: transform .15s ease, opacity .15s ease;
    }
    .project-card:hover{ transform: translateY(-3px); }

    .p1{ background: var(--card); }
    .p2{ background: var(--accent3); transform: translateY(-12px); }
    .p3{ background: var(--card2); }
    .p4{ background: var(--accent3); }
    .p5{ background: var(--card2); }
    .p6{ background: var(--accent3); }

    .label{
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      opacity:.95;
    }

    /* fleurs */
    .flower-deco{
      position:absolute;
      top:16px; left:16px;
      width:70px; height:70px;
      opacity:.22;
      pointer-events:none;
      background:
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px);
      background-repeat:no-repeat;
      background-position: 50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%;
    }
/* ===== ENTRÉE CINÉMATIQUE DES PROJETS ===== */
.page-projets .project-card{
  opacity: 0;
  transform: 
    translateY(120px)
    rotate(-8deg)
    scale(.7);
  filter: blur(8px);
  animation: megaEnter 1.2s cubic-bezier(.16,1,.3,1) forwards;
}

.page-projets .project-card:nth-child(1){ animation-delay:.1s }
.page-projets .project-card:nth-child(2){ animation-delay:.25s }
.page-projets .project-card:nth-child(3){ animation-delay:.4s }
.page-projets .project-card:nth-child(4){ animation-delay:.55s }
.page-projets .project-card:nth-child(5){ animation-delay:.7s }
.page-projets .project-card:nth-child(6){ animation-delay:.85s }

@keyframes megaEnter{
  0%{
    opacity: 0;
    transform: translateY(60px) scale(.9);
    filter: blur(14px);
  }

  70%{
    filter: blur(3px);
  }

  100%{
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0); /* 🔥 LE PLUS IMPORTANT */
  }
}
}

/* ===== HOVER WOUAHHH ===== */
.page-projets .project-card{
  transition: 
    transform .35s cubic-bezier(.2,1,.3,1),
    box-shadow .35s ease;
}

.page-projets .project-card:hover{
  transform:
    translateY(-18px)
    rotate(2deg)
    scale(1.08);
  box-shadow:
    0 40px 80px rgba(0,0,0,.25),
    inset 0 0 0 2px rgba(255,255,255,.35);
}

/* halo lumineux vivant */
.page-projets .project-card::after{
  content:"";
  position:absolute;
  inset:-40%;
  background: radial-gradient(circle, rgba(255,255,255,.35), transparent 60%);
  opacity:0;
  transition:.4s ease;
}

.page-projets .project-card:hover::after{
  opacity:.6;
}
    @media (max-width:980px){
      .page-title{font-size:34px}
      .projects-grid{ grid-template-columns: 1fr; }
      .project-card{ height:200px; }
      .p2{ transform:none; }
    }
.page-projets .project-card{
  will-change: transform, opacity, filter;
}
  </style>
</head>

<body class="page-projets">
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="logo">jp</div>
        <div class="name">JESSICA PUTZU</div>
      </div>

      <nav>
        <a href="index.html">Accueil</a>
        <a href="parcours.html">mon parcours</a>
        <a href="contact.html">Contact</a>
        <a href="apropos.html">À propos</a>
      </nav>
    </header>

    <h1 class="page-title">MES PROJETS</h1>

    <main class="projects-grid">
      <a class="project-card p1" href="projet1.html"><div class="flower-deco"></div><div class="label">PROJET 1</div></a>
      <a class="project-card p2" href="projet2.html"><div class="flower-deco"></div><div class="label">PROJET 2</div></a>
      <a class="project-card p3" href="projet3.html"><div class="flower-deco"></div><div class="label">PROJET 3</div></a>
      <a class="project-card p4" href="projet4.html"><div class="flower-deco"></div><div class="label">PROJET 4</div></a>
      <a class="project-card p5" href="projet5.html"><div class="flower-deco"></div><div class="label">PROJET 5</div></a>
      <a class="project-card p6" href="projet6.html"><div class="flower-deco"></div><div class="label">PROJET 6</div></a>
    </main>
  </div>
</body>
</html>
